name: C++ Format Checker

on: pull_request

jobs:
  cpp-linter:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Required to compare against the base branch
          fetch-depth: 0

      - name: install clang-format and dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format libstdc++-*-dev

      - name: Run C++ format check on changed files
        run: |
          # Fetch main branch from origin
          git fetch origin main --depth=1 || true

          # Find all changed non-third-party C/C++ files
          changed_files=$(git diff --name-only origin/main HEAD | grep -E "\.(c|h|cc|hh|cpp|hpp)$" | grep -v "third_party" || true)

          if [ -z "$changed_files" ]; then
            echo "No C++ files changed, skipping format check."
            exit 0
          fi

          echo "Checking formatting of the following files:"
          echo "$changed_files"

          # Run clang-format to check for formatting errors
          clang-format --dry-run --Werror --style=file $changed_files
          echo "All C++ files are perfectly formatted!"
