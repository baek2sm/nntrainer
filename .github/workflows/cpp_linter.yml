name: C++ Format Checker

on: pull_request

jobs:
  cpp-linter:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so cpp-linter can compute the changed-file
          # list from the local git diff (use-git-diff) instead of the PR API.
          fetch-depth: 0
      - name: install dev packages
        run: |
          echo "Install mandatory dev packages to avoid false-positive reports from cpp-linter"
          sudo apt-get update
          sudo apt-get install libstdc++-*-dev
      - uses: cpp-linter/cpp-linter-action@v2.9.0
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          version: 14
          lines-changed-only: true
          # Fetch the changed-file list from the local git diff instead of the
          # pull-request API. Large rebrand/refactor PRs exceed GitHub's
          # 300-file diff limit (HTTP 406), which crashes the linter before it
          # can run clang-format; the local git diff has no such limit.
          use-git-diff: true
          file-annotations: false
          step-summary: true
          format-review: true
          tidy-checks: '-*' # disable clang-tidy checks.
          # third_party/ holds vendored upstream code (minja, ...) that is not
          # formatted to nntrainer style; skip it like static.check.yml does.
          ignore: '.github|Applications/quick_ai/third_party'

      - name: failing fast
        if: steps.linter.outputs.clang-format-checks-failed > 0
        run: |
          echo "This PR failed to pass the C++ source file format checks."
          exit 1
